# N8N - Workflow Automation (SSO via auth-gateway forward_auth)
# Use http:// prefix to prevent automatic HTTPS redirect (Cloudflare Tunnel handles SSL)
# Auth flow: Caddy → auth-gateway /auth/verify (checks session + n8n role) → N8N
http://n8n.hcai42.com {
    forward_auth 192.168.178.243:3100 {
        uri /auth/verify?role=n8n
        copy_headers X-Auth-User

        @unauthorized status 401 403
        handle_response @unauthorized {
            redir https://supa.hcai42.com/auth/login 302
        }
    }
    reverse_proxy n8n:5678
}
